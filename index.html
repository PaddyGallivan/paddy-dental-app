<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hobson's Bay Dental</title>
<style>
  @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }
  @keyframes scoreGlow { 0%,100% { box-shadow:0 0 20px rgba(8,145,178,.3); } 50% { box-shadow:0 0 40px rgba(8,145,178,.6); } }
  @keyframes slideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes countUp { from { opacity:0; } to { opacity:1; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow-x:hidden; overflow-y:auto; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f0fdfa; }
  #root { width:100%; height:100%; display:flex; flex-direction:column; }
  .main-content { overflow-y:auto; flex:1; }
  ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:#22d3ee; border-radius:4px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const Icon = ({ name, size = 20, color = "#64748b", style }) => {
  const icons = {
    home: `<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>`,
    "calendar-plus": `<path d="M21 13V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><line x1="19" x2="19" y1="16" y2="22"/><line x1="16" x2="22" y1="19" y2="19"/>`,
    "calendar-days": `<rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/>`,
    award: `<circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>`,
    user: `<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>`,
    star: `<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>`,
    clock: `<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>`,
    check: `<path d="M20 6 9 17l-5-5"/>`,
    zap: `<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>`,
    heart: `<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>`,
    phone: `<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>`,
    "chevron-right": `<polyline points="9 18 15 12 9 6"/>`,
    map: `<polygon points="12 2 19 6 19 13 12 17 5 13 5 6 12 2"/><polyline points="12 17 12 21"/><polyline points="19 13 22 15"/><polyline points="5 13 2 15"/>`,
    "arrow-right": `<line x1="5" x2="19" y1="12" y2="12"/><polyline points="12 5 19 12 12 19"/>`,
    gift: `<circle cx="12" cy="7" r="5"/><path d="M3.12 15.39h17.75M7.53 11.74h8.94M7.53 22h8.94L8.36 15.39h7.28L7.53 22M9.61 15.39c-2.2.5-4.45 2-4.45 6.61M14.39 15.39c2.2.5 4.45 2 4.45 6.61"/>`,
    settings: `<circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m3.08-3.08l4.24-4.24M19.78 19.78l-4.24-4.24m-3.08-3.08l-4.24-4.24"/>`,
    bell: `<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>`,
  };
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style} dangerouslySetInnerHTML={{ __html: icons[name] || "" }} />
  );
};

const C = {
  primary: "#0891b2", primaryLight: "#22d3ee",
  bg: "#f0fdfa", white: "#ffffff", card: "#ffffff", text: "#0f172a", textMuted: "#64748b", textLight: "#94a3b8",
  border: "#e2e8f0", success: "#10b981", warning: "#f59e0b", danger: "#ef4444",
  gold: "#eab308", silver: "#94a3b8", bronze: "#cd7f32", platinum: "#a78bfa",
  gradient: "linear-gradient(135deg, #0891b2 0%, #14b8a6 100%)",
};

const Badge = ({ children, color = C.primary, style }) => (
  <span style={{ display:"inline-flex", alignItems:"center", gap:4, background:color+"18", color, fontSize:12, fontWeight:600, padding:"3px 10px", borderRadius:20, ...style }}>{children}</span>
);

const Card = ({ children, style, onClick, animated = true }) => (
  <div onClick={onClick} style={{ background:C.card, borderRadius:16, padding:20, boxShadow:"0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04)", border:`1px solid ${C.border}`, animation: animated ? "fadeInUp .5s ease both" : "none", cursor: onClick ? "pointer" : "default", transition:"transform .2s, box-shadow .2s", ...style }}
    onMouseEnter={e => { if(onClick){e.currentTarget.style.transform="translateY(-2px)"; e.currentTarget.style.boxShadow="0 8px 25px rgba(0,0,0,.1)"; }}}
    onMouseLeave={e => { if(onClick){e.currentTarget.style.transform="translateY(0)"; e.currentTarget.style.boxShadow="0 1px 3px rgba(0,0,0,.06)"; }}}>{children}</div>
);

const Button = ({ children, onClick, variant="primary", disabled, style }) => {
  const base = { display:"inline-flex", alignItems:"center", justifyContent:"center", gap:8, border:"none", borderRadius:12, padding:"12px 24px", fontSize:15, fontWeight:600, cursor: disabled?"not-allowed":"pointer", transition:"all .2s", opacity: disabled?0.5:1 };
  const variants = { primary:{background:C.gradient,color:C.white}, secondary:{background:C.bg,color:C.primary,border:`2px solid ${C.primary}`}, danger:{background:C.danger+"15",color:C.danger}, ghost:{background:"transparent",color:C.textMuted} };
  return <button onClick={disabled?undefined:onClick} style={{...base,...variants[variant],...style}}>{children}</button>;
};

const SectionTitle = ({ children }) => <h2 style={{ fontSize:18, fontWeight:700, color:C.text, marginBottom:14 }}>{children}</h2>;

function HomePage({ appointments, setTab, flossData, onFlossLog }) {
  const [scoreAnim, setScoreAnim] = useState(false);
  useEffect(() => { const t=setTimeout(()=>setScoreAnim(true),300); return ()=>clearTimeout(t); }, []);
  const upcoming = appointments.filter(a=>a.status==="upcoming")[0];
  const flossStreak = Object.values(flossData).filter(v=>v).length;

  return (
    <div style={{ padding:"20px 16px 100px" }}>
      <div style={{ background:C.gradient, borderRadius:20, padding:"28px 24px", marginBottom:20, color:C.white, position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", top:-30, right:-30, width:120, height:120, borderRadius:"50%", background:"rgba(255,255,255,.08)" }} />
        <div style={{ position:"absolute", bottom:-20, left:-20, width:80, height:80, borderRadius:"50%", background:"rgba(255,255,255,.05)" }} />
        <p style={{ fontSize:14, opacity:0.85, marginBottom:4 }}>Welcome back,</p>
        <h1 style={{ fontSize:28, fontWeight:800, marginBottom:2 }}>Paddy</h1>
        <p style={{ fontSize:13, opacity:0.7 }}>Hobson's Bay Dental</p>
      </div>

      <Card style={{ textAlign:"center", marginBottom:20 }}>
        <p style={{ fontSize:13, color:C.textMuted, marginBottom:8, fontWeight:500 }}>Your Dental Score</p>
        <div style={{ width:120, height:120, borderRadius:"50%", background:C.gradient, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", margin:"0 auto 12px", animation: scoreAnim?"scoreGlow 2s ease-in-out infinite":"none", transition:"all .6s", transform: scoreAnim?"scale(1)":"scale(0.5)", opacity: scoreAnim?1:0 }}>
          <span style={{ fontSize:36, fontWeight:900, color:C.white, lineHeight:1 }}>A+</span>
          <span style={{ fontSize:14, color:"rgba(255,255,255,.85)", fontWeight:600 }}>x 7</span>
        </div>
        <p style={{ fontSize:13, color:C.textMuted }}>Keep it up! You're a dental superstar.</p>
      </Card>

      <Card style={{ marginBottom:20, borderLeft:`4px solid ${C.primary}` }}>
        <p style={{ fontSize:12, color:C.textMuted, marginBottom:8 }}>Floss Streak</p>
        <div style={{ fontSize:24, fontWeight:800, color:C.text, marginBottom:4 }}>{flossStreak} ðª¥ days</div>
        <Button variant="primary" onClick={()=>onFlossLog()} style={{width:"100%",marginTop:8}}>
          <Icon name="zap" size={16} color={C.white} /> Log Floss Today
        </Button>
      </Card>

      {upcoming && (
        <>
          <SectionTitle>Next Appointment</SectionTitle>
          <Card style={{ marginBottom:20, borderLeft:`4px solid ${C.primary}` }} onClick={()=>setTab("book")}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <p style={{ fontWeight:700, fontSize:15, color:C.text }}>{upcoming.service}</p>
                <p style={{ fontSize:13, color:C.textMuted, marginTop:4 }}>{upcoming.dentist}</p>
                <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:8 }}>
                  <Icon name="calendar-days" size={14} color={C.primary} />
                  <span style={{ fontSize:13, color:C.primary, fontWeight:600 }}>{new Date(upcoming.date).toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"})}</span>
                  <Icon name="clock" size={14} color={C.textMuted} style={{marginLeft:8}} />
                  <span style={{ fontSize:13, color:C.textMuted }}>{upcoming.time}</span>
                </div>
              </div>
              <Icon name="chevron-right" size={20} color={C.textLight} />
            </div>
          </Card>
        </>
      )}

      <SectionTitle>Quick Stats</SectionTitle>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
        {[{label:"Total Visits",value:"4",icon:"calendar-days",color:C.primary},{label:"Member Since",value:"Mar '24",icon:"heart",color:C.danger},{label:"Current Tier",value:"Silver",icon:"star",color:C.silver}].map((s,i) => (
          <Card key={i} style={{ textAlign:"center", padding:14, animationDelay:`${i*0.1}s` }}>
            <div style={{marginBottom:6}}><Icon name={s.icon} size={18} color={s.color} /></div>
            <p style={{ fontSize:18, fontWeight:800, color:C.text }}>{s.value}</p>
            <p style={{ fontSize:11, color:C.textMuted, marginTop:2 }}>{s.label}</p>
          </Card>
        ))}
      </div>
    </div>
  );
}

function FlossTrackerPage({ flossData, onFlossLog }) {
  const week = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  return (
    <div style={{ padding:"20px 16px 100px" }}>
      <h1 style={{ fontSize:24, fontWeight:800, color:C.text, marginBottom:20 }}>Floss Tracker</h1>
      <Card style={{ marginBottom:20, textAlign:"center", background:C.gradient, border:"none" }}>
        <div style={{ color:C.white }}>
          <p style={{ fontSize:14, opacity:0.85 }}>This Week's Goal</p>
          <div style={{ fontSize:32, fontWeight:800, margin:"12px 0", animation:"pulse 2s ease infinite" }}>{Object.values(flossData).filter(v=>v).length} / 7</div>
          <p style={{ fontSize:13, opacity:0.8 }}>You're doing great! Keep it up! ð</p>
        </div>
      </Card>
      <SectionTitle>Daily Log</SectionTitle>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
        {week.map((day,i)=>(
          <Card key={i} onClick={()=>onFlossLog(i)} style={{textAlign:"center",padding:12,cursor:"pointer",borderColor:flossData[i]?C.success:C.border,borderWidth:2,background:flossData[i]?C.success+"10":"transparent"}}>
            <p style={{fontSize:12,color:C.textMuted,marginBottom:8}}>{day}</p>
            <div style={{fontSize:20}}>{flossData[i]?"â":"â"}</div>
          </Card>
        ))}
      </div>
    </div>
  );
}

function BookPage({ setTab }) {
  return (
    <div style={{ padding:"20px 16px 100px" }}>
      <h1 style={{ fontSize:24, fontWeight:800, color:C.text, marginBottom:20 }}>Book Appointment</h1>

      <Card style={{ marginBottom:20, background:C.gradient, border:"none", color:C.white }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}>
          <Icon name="calendar-plus" size={24} color={C.white} />
          <span style={{ fontSize:14, fontWeight:600 }}>Online Booking</span>
        </div>
        <p style={{ fontSize:13, opacity:0.9, marginTop:8 }}>Powered by Dental4Web</p>
      </Card>

      <SectionTitle>Our Locations</SectionTitle>
      <Card style={{ marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"flex-start", gap:12, marginBottom:12 }}>
          <Icon name="map" size={20} color={C.primary} style={{ marginTop:2, flexShrink:0 }} />
          <div style={{ flex:1 }}>
            <p style={{ fontSize:15, fontWeight:700, color:C.text, marginBottom:4 }}>Williamstown</p>
            <p style={{ fontSize:13, color:C.textMuted, marginBottom:8 }}>72 Electra Street</p>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <Icon name="phone" size={14} color={C.primary} />
              <p style={{ fontSize:13, color:C.primary, fontWeight:600 }}>(03) 9399 1233</p>
            </div>
          </div>
        </div>
      </Card>

      <Card style={{ marginBottom:20 }}>
        <div style={{ display:"flex", alignItems:"flex-start", gap:12, marginBottom:12 }}>
          <Icon name="map" size={20} color={C.primary} style={{ marginTop:2, flexShrink:0 }} />
          <div style={{ flex:1 }}>
            <p style={{ fontSize:15, fontWeight:700, color:C.text, marginBottom:4 }}>Altona North</p>
            <p style={{ fontSize:13, color:C.textMuted, marginBottom:8 }}>173 Millers Road</p>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <Icon name="phone" size={14} color={C.primary} />
              <p style={{ fontSize:13, color:C.primary, fontWeight:600 }}>(03) 9315 0088</p>
            </div>
          </div>
        </div>
      </Card>

      <SectionTitle>eAppointments</SectionTitle>
      <Card style={{ marginBottom:20, textAlign:"center", background:"linear-gradient(135deg, rgba(8,145,178,.05) 0%, rgba(20,184,166,.05) 100%)", borderStyle:"dashed" }}>
        <Icon name="calendar-plus" size={40} color={C.primary} style={{ margin:"0 auto 12px" }} />
        <p style={{ fontSize:14, fontWeight:600, color:C.text, marginBottom:8 }}>Ready to Book?</p>
        <p style={{ fontSize:13, color:C.textMuted, marginBottom:16 }}>eAppointments booking will appear here once connected to Dental4Web</p>
        <Button variant="primary" style={{ width:"100%" }}>
          <Icon name="arrow-right" size={16} color={C.white} /> Coming Soon
        </Button>
      </Card>

      <SectionTitle>Emergency</SectionTitle>
      <Card style={{ borderLeft:`4px solid ${C.danger}`, marginBottom:20 }}>
        <p style={{ fontSize:13, color:C.textMuted, marginBottom:8, fontWeight:500 }}>After Hours</p>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
          <Icon name="phone" size={18} color={C.danger} />
          <p style={{ fontSize:15, fontWeight:700, color:C.text }}>1300 DENTAL (1300 336 825)</p>
        </div>
        <p style={{ fontSize:12, color:C.textMuted }}>Available 24/7 for emergencies</p>
      </Card>

      <SectionTitle>Opening Hours</SectionTitle>
      <Card>
        <div style={{ display:"grid", gap:10 }}>
          {[
            {day:"Monday - Friday",hours:"8:00 AM - 6:00 PM"},

            {day:"Sunday",hours:"Closed"},
          ].map((h,i) => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingBottom:10, borderBottom: i<2 ? `1px solid ${C.border}` : "none" }}>

function RewardsPage() {
  const [displayPoints, setDisplayPoints] = useState(0);
  const actualPoints = 1250;
  const currentTier = "Silver";
  const tierInfo = [
    {name:"Bronze",points:0,color:C.bronze},
    {name:"Silver",points:500,color:C.silver},
    {name:"Gold",points:2000,color:C.gold},
    {name:"Platinum",points:5000,color:C.platinum},
  ];
  const nextTier = tierInfo.find(t => t.points > actualPoints);
  const pointsToNextTier = nextTier ? nextTier.points - actualPoints : 0;
  const progressPercent = nextTier ? ((actualPoints - (tierInfo[tierInfo.indexOf(tierInfo.find(t => t.name === currentTier))]?.points || 0)) / (nextTier.points - (tierInfo[tierInfo.indexOf(tierInfo.find(t => t.name === currentTier))]?.points || 0))) * 100 : 100;

  useEffect(() => {
    let current = 0;
    const interval = setInterval(() => {
      current += Math.ceil(actualPoints / 30);
      if (current >= actualPoints) {
        setDisplayPoints(actualPoints);
        clearInterval(interval);
      } else {
        setDisplayPoints(current);
      }
    }, 50);
    return () => clearInterval(interval);
  }, []);

  const rewards = [
    {name:"Free Whitening",cost:2000,icon:"star"},
    {name:"Electric Toothbrush",cost:3500,icon:"zap"},
    {name:"$50 Treatment Credit",cost:1500,icon:"gift"},
  ];

  const activities = [
    {action:"Checkup - Dr. Mitchell",points:"+100",date:"Apr 1"},
    {action:"Professional Clean",points:"+150",date:"Mar 28"},
    {action:"Referral Bonus - John K",points:"+500",date:"Mar 15"},
  ];

  return (
    <div style={{ padding:"20px 16px 100px" }}>
      <h1 style={{ fontSize:24, fontWeight:800, color:C.text, marginBottom:20 }}>Rewards</h1>

      <Card style={{ marginBottom:20, background:C.gradient, border:"none", color:C.white, textAlign:"center" }}>
        <p style={{ fontSize:13, opacity:0.85, marginBottom:12 }}>Your Points</p>
        <div style={{ fontSize:48, fontWeight:900, marginBottom:4, animation:"countUp .6s ease" }}>{displayPoints.toLocaleString()}</div>
        <p style={{ fontSize:13, opacity:0.8 }}>Current: <strong>{currentTier}</strong> Tier</p>
      </Card>

      <Card style={{ marginBottom:20 }}>
        <p style={{ fontSize:13, color:C.textMuted, marginBottom:12, fontWeight:500 }}>Progress to {nextTier?.name}</p>
        <div style={{ background:C.bg, borderRadius:12, height:8, marginBottom:8, overflow:"hidden" }}>
          <div style={{ background:C.gradient, height:"100%", width:`${Math.min(progressPercent, 100)}%`, transition:"width .6s ease" }} />
        </div>
        <p style={{ fontSize:12, color:C.textMuted }}>{pointsToNextTier} points to {nextTier?.name}</p>
      </Card>

      <SectionTitle>Tier Badges</SectionTitle>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:20 }}>
        {tierInfo.map((tier,i) => (
          <Card key={i} style={{ textAlign:"center", padding:16, opacity: actualPoints >= tier.points ? 1 : 0.5, borderColor: actualPoints >= tier.points ? tier.color : C.border, borderWidth:2 }}>
            <div style={{ width:40, height:40, borderRadius:"50%", background:tier.color, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 8px" }}>
              <Icon name="star" size={20} color={C.white} />
            </div>
            <p style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:4 }}>{tier.name}</p>
            <p style={{ fontSize:11, color:C.textMuted }}>{tier.points} pts</p>
          </Card>
        ))}
      </div>

      <SectionTitle>How to Earn Points</SectionTitle>
      <Card style={{ marginBottom:20 }}>
        <div style={{ display:"grid", gap:12 }}>
          {[
            {action:"Checkup",points:100},
            {action:"Professional Clean",points:150},
            {action:"Referral",points:500},
            {action:"Floss Streak - 7 days",points:50},
          ].map((e,i) => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingBottom:12, borderBottom: i<3 ? `1px solid ${C.border}` : "none" }}>
              <p style={{ fontSize:13, fontWeight:600, color:C.text }}>{e.action}</p>
              <Badge color={C.primary} style={{ fontSize:12, fontWeight:700 }}>+{e.points}</Badge>
            </div>
          ))}
        </div>
      </Card>

      <SectionTitle>Recent Activity</SectionTitle>
      <Card style={{ marginBottom:20 }}>
        <div style={{ display:"grid", gap:12 }}>
          {activities.map((a,i) => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingBottom:12, borderBottom: i<2 ? `1px solid ${C.border}` : "none" }}>
              <div>
                <p style={{ fontSize:13, fontWeight:600, color:C.text }}>{a.action}</p>
                <p style={{ fontSize:12, color:C.textMuted, marginTop:2 }}>{a.date}</p>
              </div>
              <p style={{ fontSize:13, fontWeight:700, color:C.success }}>{a.points}</p>
            </div>
          ))}
        </div>
      </Card>

      <SectionTitle>Redeem Points</SectionTitle>
      <div style={{ display:"grid", gap:12 }}>
        {rewards.map((r,i) => (

function HobsonsBayDental() {
  const [tab,setTab] = useState("home");
  const [flossData,setFlossData] = useState({0:true,1:true,2:true,3:true,4:false,5:false,6:false});
  const onFlossLog = (day) => {
    const today = new Date().getDay()-1;
    const d = day !== undefined ? day : today;
    setFlossData(p=>({...p,[d]:!p[d]}));
  };

  const TABS = [
    {id:"home",label:"Home",icon:"home"},
    {id:"floss",label:"Floss",icon:"zap"},
    {id:"book",label:"Book",icon:"calendar-plus"},
    {id:"rewards",label:"Rewards",icon:"award"},
    {id:"profile",label:"Profile",icon:"user"},
  ];

  return (
    <div style={{ maxWidth:480, margin:"0 auto", minHeight:"100vh", background:C.bg, position:"relative", fontFamily:"system-ui,sans-serif" }}>
      <div className="main-content">
        {tab==="home" && <HomePage appointments={[{id:1,date:"2026-04-18",time:"10:00 AM",service:"Checkup & Clean",dentist:"Dr. Sarah Mitchell",status:"upcoming"}]} setTab={setTab} flossData={flossData} onFlossLog={onFlossLog} />}
        {tab==="floss" && <FlossTrackerPage flossData={flossData} onFlossLog={onFlossLog} />}
        {tab==="book" && <BookPage setTab={setTab} />}
        {tab==="rewards" && <RewardsPage />}
        {tab==="profile" && <ProfilePage setTab={setTab} />}
      </div>

      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, background:"rgba(255,255,255,.95)", backdropFilter:"blur(12px)", borderTop:`1px solid ${C.border}`, display:"flex", justifyContent:"space-around", padding:"8px 0 max(8px, env(safe-area-inset-bottom))", zIndex:100 }}>
        {TABS.map(t=>{
          const active = tab===t.id;
          return (
            <button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"6px 12px",borderRadius:12,transition:"all .2s",position:"relative"}}>
              {active && <div style={{position:"absolute",top:-1,width:20,height:3,borderRadius:2,background:C.primary}} />}
              <Icon name={t.icon} size={22} color={active?C.primary:C.textLight} strokeWidth={active?2.5:1.8} />
              <span style={{fontSize:11,fontWeight:active?700:500,color:active?C.primary:C.textLight}}>{t.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<HobsonsBayDental />);
